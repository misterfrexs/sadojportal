<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: transparent; color: white; margin: 0; padding: 20px; }
        .card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 25px; max-width: 700px; margin: 0 auto; }
        h2 { text-transform: uppercase; color: #2563eb; margin-top: 0; }
        .grid { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: #0f172a; color: white; outline: none; }
        button { background: #2563eb; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #res { margin-top: 20px; }
        .box-vierge { background: #10b981; color: white; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; }
        .box-charge { background: white; color: black; padding: 20px; border-radius: 8px; border-left: 8px solid #ef4444; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🔍 Consultation Citoyenne</h2>
        <p style="color: #94a3b8; font-size: 0.9rem;">Entrez votre identité pour vérifier votre casier judiciaire.</p>
        <div class="grid">
            <input type="text" id="prenom" placeholder="Prénom">
            <input type="text" id="nom" placeholder="NOM">
            <button onclick="chercher()">Vérifier</button>
        </div>
        <div id="res"></div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://vctidkoxzszmjmxvclsk.supabase.co', 'sb_publishable_EfA-yfIqB4_dWtDxpz6CyA_sYrhD2tA');

        async function chercher() {
            const n = document.getElementById('nom').value.trim().toUpperCase();
            const p = document.getElementById('prenom').value.trim();
            const out = document.getElementById('res');

            if(!n || !p) return;
            out.innerHTML = "Recherche en cours...";

            let { data } = await _supabase.from('casiers').select('*').eq('nom', n).eq('prenom', p);

            if (data && data.length > 0) {
                const c = data[0];
                out.innerHTML = `<div class="box-charge">
                    <h3 style="margin:0;">DOSSIER : ${c.prenom} ${c.nom}</h3>
                    <p><strong>Statut :</strong> Dossier Judiciaire Chargé</p>
                    <hr><pre style="white-space:pre-wrap; font-family:sans-serif;">${c.condamnations}</pre>
                </div>`;
            } else {
                out.innerHTML = `<div class="box-vierge">✅ RÉSULTAT : NÉANT (Casier Vierge)</div>`;
            }
        }
    </script>
</body>
</html>

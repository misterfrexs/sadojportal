            --success: #22c55e; --warning: #f59e0b; --danger: #ef4444;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: white; margin: 0; padding: 20px; display: flex; gap: 20px; height: 100vh; overflow: hidden; }
        
        .left-panel { flex: 1.2; display: flex; flex-direction: column; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; overflow: hidden; }
        #searchInput { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #0f172a; color: white; outline: none; margin-bottom: 20px; }
        
        .infractions-list { flex: 1; overflow-y: auto; padding-right: 5px; }
        .infraction-item { 
            background: rgba(15, 23, 42, 0.5); border: 1px solid var(--border); border-radius: 8px; 
            padding: 12px; margin-bottom: 8px; cursor: pointer; transition: 0.2s;
        }
        .infraction-item:hover { border-color: var(--primary); background: rgba(37, 99, 235, 0.1); }
        .inf-cat { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; }
        .inf-name { font-weight: 600; font-size: 0.95rem; }
        .inf-details { font-size: 0.8rem; color: var(--text-muted); margin-top: 5px; }

        .right-panel { flex: 0.8; display: flex; flex-direction: column; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .civil-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .civil-info input { padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: #0f172a; color: white; font-size: 0.85rem; }

        .report-area { flex: 1; background: #0f172a; border-radius: 8px; padding: 15px; font-family: 'Fira Code', monospace; font-size: 0.85rem; overflow-y: auto; border: 1px solid var(--border); }
        .summary-total { margin-top: 15px; padding-top: 15px; border-top: 1px dashed var(--border); }
        
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: 800; text-transform: uppercase; font-size: 0.8rem; }
        .btn-save { background: var(--primary); color: white; }
        .btn-reset { background: #334155; color: white; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>

            "c3_14": { nom: "Trafic de stupéfiants", cat: "LV4", amende: 0, temps: 30, art: "CP-Art 7-2.3", type: "fixe", note: "Amende Variable (Weed 30/u, Meth 100/u, Coca 130/u)" },
            "c3_15": { nom: "Blanchiment d'argent", cat: "LV4", amende: 15000, temps: 30, art: "CP-Art 8-1.2", type: "fixe", note: "Prévenir agence fédérale" },
            "c3_16": { nom: "Sédition", cat: "LV4", amende: 80000, temps: 35, art: "CP-Art 8-1.3", type: "fixe", note: "Prévenir agence fédérale" },
            "c3_17": { nom: "Violation de surveillance électronique", cat: "LV4", amende: 0, temps: 0, art: "CP-Art 8-2.1", type: "fixe", note: "Sur décision Cour de Justice" },
            "c3_18": { nom: "Fraude fiscale", cat: "LV4", amende: 0, temps: 30, art: "CP-Art 8-2.2", type: "fixe", note: "Montant dérobé + 5% pénalité. Si > 1M, temps: 00:50." },
            "c3_19": { 
                nom: "Trafic d’organes", cat: "LV4", art: "CP-Art 8-2.3", type: "code",
                options: [
                    { label: "Base", amende: 25000, temps: 50 },
                    { label: "Organisation criminelle", amende: 28000, temps: 60 },
                    { label: "Victime mineure/vulnérable", amende: 34800, temps: 65 },
                    { label: "Décès/Mutilation grave", amende: 30000, temps: 70 },
                    { label: "Moyens violents / Coercition", amende: 33890, temps: 60 }
                ]
            },
            "c3_20": { nom: "Terrorisme", cat: "LV4", amende: 400000, temps: 999, art: "CP-Art 8-1.4", type: "fixe", note: "Perpétuité - Prévenir Washington D.C" },
            "c3_21": { nom: "Traite Humaine", cat: "LV4", amende: 320700, temps: 999, art: "CP-Art 8-1.5", type: "fixe", note: "Perpétuité - Prévenir agence fédérale" },
            "c3_22": { nom: "Évasion", cat: "LV4", amende: 100000, temps: 50, art: "CP-Art 8-1.6", type: "fixe", note: "Prévenir agence fédérale" },
            "c3_23": { nom: "Conspiration", cat: "LV4", amende: 479000, temps: 999, art: "CP-Art 8-1.7", type: "fixe", note: "Perpétuité - Prévenir agence fédérale" },
            "c3_24": { nom: "Viol de la Constitution", cat: "LV4", amende: 500000, temps: 999, art: "CP-Art 8-1.8", type: "fixe", note: "Perpétuité - Prévenir agence fédérale" },
            "c3_25": { nom: "Haute trahison", cat: "LV4", amende: 500000, temps: 999, art: "CP-Art 8-1.9", type: "fixe", note: "Perpétuité - Prévenir agence fédérale" }
        };

        let selectedInfractions = [];

        // RÔLE
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('role') === 'procureur') {
            document.getElementById('role-title').innerText = "⚖️ PROCÉDURE : PROCUREUR";
        }

        // FONCTION DE RECHERCHE CORRIGÉE
        function filterInfractions() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = "";

            // On transforme l'objet BDD en tableau pour filtrer
            Object.values(bdd).filter(item => 
                item.nom.toLowerCase().includes(search) || 
                item.art.toLowerCase().includes(search)
            ).forEach(item => {
                const div = document.createElement('div');
                div.className = 'infraction-item';
                div.onclick = () => addInfraction(item);
                div.innerHTML = `
                    <div class="inf-cat" style="color:var(--${item.cat.toLowerCase()})">${item.cat} - ${item.art}</div>
                    <div class="inf-name">${item.nom}</div>
                    <div class="inf-details">${item.type === 'fixe' ? item.amende + '$' : 'Prix Variable'} | ${item.temps === 999 ? 'Perpétuité' : (item.temps || 0) + ' UP'}</div>
                `;
                listDiv.appendChild(div);
            });
        }

        // GESTION DES OPTIONS (EXCÈS DE VITESSE, FEU ROUGE, ETC.)
        function addInfraction(item) {
            if (item.type === "code" && item.options) {
                let message = `Choisissez le type pour : ${item.nom}\n\n`;
                item.options.forEach((opt, index) => {
                    message += `${index + 1}. ${opt.label} (${opt.amende}$, ${opt.temps} UP)\n`;
                });
                
                let choix = prompt(message);
                let index = parseInt(choix) - 1;
                
                if (item.options[index]) {
                    const subItem = {
                        nom: `${item.nom} (${item.options[index].label})`,
                        art: item.art,
                        amende: item.options[index].amende,
                        temps: item.options[index].temps
                    };
                    selectedInfractions.push(subItem);
                } else {
                    return; // Annulation
                }
            } else {
                selectedInfractions.push(item);
            }
            updateReport();
        }

        function updateReport() {
            const recapDiv = document.getElementById('recap-sanctions');
            let totalFine = 0, totalTime = 0, isPerp = false;

            if (selectedInfractions.length === 0) {
                recapDiv.innerHTML = '<div style="color:var(--text-muted); text-align:center; margin-top:50px;">Aucune infraction sélectionnée.</div>';
                document.getElementById('total-fine').innerText = "0$";
                document.getElementById('total-time').innerText = "00:00 UP";
                return;
            }

            let html = '<div style="margin-bottom:10px; border-bottom:1px solid var(--border); padding-bottom:5px;">LISTE DES CHEFS :</div>';
            selectedInfractions.forEach((inf, index) => {
                html += `<div style="margin-bottom:5px; display:flex; justify-content:space-between;">
                            <span>• ${inf.nom}</span>
                            <span style="color:var(--danger); cursor:pointer;" onclick="removeInfraction(${index})">✕</span>
                         </div>`;
                totalFine += inf.amende;
                if (inf.temps === 999) isPerp = true;
                else totalTime += inf.temps;
            });

            recapDiv.innerHTML = html;
            document.getElementById('total-fine').innerText = totalFine.toLocaleString() + "$";
            document.getElementById('total-time').innerText = isPerp ? "PERPÉTUITÉ" : (totalTime < 10 ? "00:0" : "00:") + totalTime + " UP";
        }

        function removeInfraction(index) {
            selectedInfractions.splice(index, 1);
            updateReport();
        }

        function resetTerminal() {
            selectedInfractions = [];
            document.getElementById('prenom').value = "";
            document.getElementById('nom').value = "";
            updateReport();
        }

        async function enregistrerDossier() {
            const nom = document.getElementById('nom').value.trim().toUpperCase();
            const prenom = document.getElementById('prenom').value.trim();
            const naissance = document.getElementById('naissance').value;
            const recapText = selectedInfractions.map(i => `${i.art} - ${i.nom}`).join('\n');
            const fine = document.getElementById('total-fine').innerText;
            const time = document.getElementById('total-time').innerText;

            if (!nom || !prenom || selectedInfractions.length === 0) {
                return alert("Veuillez remplir le nom et ajouter une infraction.");
            }

            const { error } = await _supabase.from('casiers').insert([{
                nom, prenom, naissance,
                condamnations: `BILAN :\n${recapText}\n\nTOTAL : ${fine} / ${time}`,
                statut: "Chargé",
                created_at: new Date()
            }]);

            if (error) alert("Erreur : " + error.message);
            else {
                alert("✅ Dossier enregistré !");
                resetTerminal();
            }
        }

        filterInfractions();
    </script>
</body>
</html>

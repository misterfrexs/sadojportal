<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.A.D.O.J. | Terminal de Procédure</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-dark: #0f172a;
            --panel: rgba(30, 41, 59, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
        }

        /* --- BASES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            font-family: 'Inter', -apple-system, sans-serif;
            color: white;
            line-height: 1.6;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SCROLLBARS MODERNES --- */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { 
            background: rgba(255,255,255,0.1); 
            border-radius: 10px; 
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* --- COLONNE GAUCHE (RECHERCHE) --- */
        .search-container {
            background: var(--panel);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .search-bar {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-family: 'Fira Code', monospace;
            font-size: 1rem;
            transition: 0.3s;
        }
        .search-bar:focus { outline: none; border-color: var(--primary); background: rgba(0,0,0,0.5); }

        .results-list {
            overflow-y: auto;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 5px;
        }

        .infraction-card {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            border-left: 4px solid #64748b;
        }
        .infraction-card:hover { background: rgba(255,255,255,0.08); transform: translateX(5px); }
        .infraction-card.LV1 { border-color: #94a3b8; }
        .infraction-card.LV2 { border-color: #fbbf24; }
        .infraction-card.LV3 { border-color: #f97316; }
        .infraction-card.LV4 { border-color: #ef4444; }

        /* --- COLONNE DROITE (DOSSIER) --- */
        .summary-panel {
            background: var(--panel);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .section-title {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            margin: 20px 0 10px 0;
            letter-spacing: 1px;
        }
        .section-title:first-child { margin-top: 0; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .input-grid input {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 8px;
            color: white;
            font-family: inherit;
            width: 100%;
        }
        .full-width { grid-column: 1 / -1; }

        select {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 8px;
            color: white;
            width: 100%;
            cursor: pointer;
        }

        .totals-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .total-box {
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--primary);
            text-align: center;
        }
        .total-box.success { border-color: var(--success); }
        .total-box h2 { margin-bottom: 5px; font-size: 0.7rem; color: var(--primary); text-transform: uppercase; }
        .total-box.success h2 { color: var(--success); }
        .total-box .value { font-size: 1.5rem; font-weight: 800; font-family: 'Fira Code', monospace; }

        .selected-list {
            flex-grow: 1;
            overflow-y: auto;
            font-size: 0.85rem;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 10px;
            margin: 15px 0;
            min-height: 100px;
        }
        .selected-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .btn-action {
            width: 100%;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .btn-generate { background: var(--primary); color: white; }
        .btn-generate:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-clear { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        .btn-clear:hover { background: var(--danger); color: white; }

        /* MODAL */
        #options-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; justify-content: center; align-items: center; z-index: 100;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--panel); padding: 30px; border-radius: 20px; 
            width: 90%; max-width: 450px; border: 1px solid var(--border);
        }
        .opt-btn {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: white; padding: 12px; border-radius: 10px; margin-bottom: 10px;
            cursor: pointer; text-align: left; transition: 0.2s;
        }
        .opt-btn:hover { background: var(--primary); }
    </style>
</head>
<body>

    <div class="search-container">
        <h1 style="font-size: 1.1rem; margin: 0; color: var(--primary); font-weight: 800;">S.A.D.O.J | Base de données pénale</h1>
        <input type="text" class="search-bar" id="search" placeholder="Rechercher une infraction..." onkeyup="filterInfractions()">
        <div class="results-list" id="results"></div>
    </div>

    <div class="summary-panel">
        <div class="section-title">Informations du Sujet</div>
        <div class="input-grid">
            <input type="text" id="suspect-nom" placeholder="Nom">
            <input type="text" id="suspect-prenom" placeholder="Prénom">
            <input type="text" class="full-width" id="suspect-id" placeholder="N° de Passeport / ID">
        </div>

        <div class="section-title">Officier en charge</div>
        <div class="input-grid">
            <input type="text" id="officier-nom" placeholder="Nom de l'officier">
            <input type="text" id="officier-id" placeholder="Matricule">
        </div>

        <div class="section-title">Procédure & Comportement</div>
        <select id="cooperation-level" onchange="updateSummary()">
            <option value="1.0">Comportement Normal (Base)</option>
            <option value="0.8">Coopératif (-20% Amende/Peine)</option>
            <option value="1.2">Non Coopératif (+20% Amende/Peine)</option>
        </select>

        <div class="totals-grid">
            <div class="total-box">
                <h2>Amende Finale</h2>
                <div class="value" id="total-amende">0 $</div>
            </div>
            <div class="total-box success">
                <h2>Peine Finale</h2>
                <div class="value" id="total-temps">0 min</div>
            </div>
        </div>

        <div class="section-title">Chefs d'inculpation retenus</div>
        <div class="selected-list" id="selected-list"></div>
        
        <button class="btn-action btn-generate" onclick="genererCasierPDF()">Générer l'extrait de Casier Judiciaire</button>
        <button class="btn-action btn-clear" onclick="clearAll()">Réinitialiser les données</button>
    </div>

    <div id="options-modal">
        <div class="modal-content" id="modal-content"></div>
    </div>

        function filterInfractions() {
            const query = document.getElementById('search').value.toLowerCase();
            const results = document.getElementById('results');
            results.innerHTML = "";
            if (query.length < 2) return;
            Object.keys(bdd).forEach(key => {
                const item = bdd[key];
                if (item.nom.toLowerCase().includes(query) || item.art.toLowerCase().includes(query)) {
                    const div = document.createElement('div');
                    div.className = `infraction-card ${item.cat}`;
                    div.innerHTML = `<strong>${item.nom}</strong> <small style="float:right">${item.art}</small>`;
                    div.onclick = () => addInfraction(key);
                    results.appendChild(div);
                }
            });
        }

        function addInfraction(key) {
            const item = bdd[key];
            if (item.type === "code") openOptions(key);
            else { dossier.push({ nom: item.nom, amende: item.amende, temps: item.temps }); updateSummary(); }
        }

        function openOptions(key) {
            const item = bdd[key];
            const modal = document.getElementById('options-modal');
            const content = document.getElementById('modal-content');
            modal.style.display = "flex";
            content.innerHTML = `<h2 style="margin-top:0">${item.nom}</h2><p style="color:#94a3b8">Choisissez la circonstance :</p>`;
            item.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "opt-btn";
                btn.innerText = `${opt.label} (${opt.amende}$)`;
                btn.onclick = () => {
                    if (opt.unite) {
                        const qte = prompt("Quantité ?", "1");
                        if (qte && !isNaN(qte)) dossier.push({ nom: `${item.nom} (${opt.label} x${qte})`, amende: opt.amende * qte, temps: opt.temps * qte });
                    } else { dossier.push({ nom: `${item.nom} (${opt.label})`, amende: opt.amende, temps: opt.temps }); }
                    modal.style.display = "none";
                    updateSummary();
                };
                content.appendChild(btn);
            });
        }

        function updateSummary() {
            const list = document.getElementById('selected-list');
            const totalA = document.getElementById('total-amende');
            const totalT = document.getElementById('total-temps');
            const coopVal = parseFloat(document.getElementById('cooperation-level').value);
            list.innerHTML = "";
            let baseA = 0; let baseT = 0; let perp = false;
            dossier.forEach(item => {
                baseA += item.amende;
                if (item.temps === 9999 || item.temps === "Perpétuité") perp = true;
                else if (typeof item.temps === 'number') baseT += item.temps;
                const div = document.createElement('div');
                div.className = "selected-item";
                div.innerHTML = `<span>${item.nom}</span> <strong>${item.amende}$</strong>`;
                list.appendChild(div);
            });
            const finalA = Math.round(baseA * coopVal);
            const finalT = perp ? "PERPÉTUITÉ" : Math.round(baseT * coopVal) + " min";
            totalA.innerText = `${finalA.toLocaleString()} $`;
            totalT.innerText = finalT;
        }

    <script>
    function adaptTerminalToRole() {
        try {
            // On récupère l'utilisateur connecté sur le portail principal
            const user = window.parent.netlifyIdentity.currentUser();
            if (!user) return;

            // On récupère les rôles (en minuscules pour éviter les bugs)
            const roles = (user.app_metadata.roles || []).map(r => r.toLowerCase());

            // SI C'EST UN PROCUREUR
            if (roles.includes('procureur')) {
                const allElements = document.querySelectorAll('label, p, span, h1, h2, h3, h4, td');
                
                allElements.forEach(el => {
                    // 1. On remplace "Officier en charge" par "Procureur en charge"
                    if (el.innerText.includes("Officier en charge")) {
                        el.innerText = el.innerText.replace("Officier en charge", "Procureur en charge");
                    }

                    // 2. On cache le Matricule (Label + Champ)
                    if (el.innerText.includes("Matricule")) {
                        el.style.display = 'none'; // Cache le texte "Matricule"
                        
                        // Si le champ de saisie est juste après, on le cache aussi
                        if (el.nextElementSibling && (el.nextElementSibling.tagName === 'INPUT' || el.nextElementSibling.tagName === 'SPAN')) {
                            el.nextElementSibling.style.display = 'none';
                        }
                        
                        // Si c'est dans un tableau (td), on peut aussi cacher la cellule d'à côté
                        if (el.tagName === 'TD' && el.nextElementSibling) {
                            el.nextElementSibling.style.display = 'none';
                        }
                    }
                });
            }
            // SI C'EST UN OFFICIER : On ne touche à rien (comportement par défaut)
        } catch (e) {
            console.warn("Liaison avec le portail S.A.D.O.J. en attente...");
        }
    }

    // On lance la vérification dès que la page est chargée
    window.addEventListener('load', () => {
        // Un petit délai de 500ms pour laisser le temps à Netlify de s'initialiser
        setTimeout(adaptTerminalToRole, 500);
    });
</script>
<script>
    function applyProcureurMode() {
        // On vérifie si l'adresse contient "?role=procureur"
        const params = new URLSearchParams(window.location.search);
        if (params.get('role') === 'procureur') {
            
            // 1. Remplacer "OFFICIER EN CHARGE" par "PROCUREUR EN CHARGE"
            // On cherche partout dans la page
            const elements = document.querySelectorAll('h1, h2, h3, h4, label, span, p, td');
            elements.forEach(el => {
                if (el.innerText.toUpperCase().includes("OFFICIER EN CHARGE")) {
                    el.innerText = el.innerText.replace(/OFFICIER EN CHARGE/i, "PROCUREUR EN CHARGE");
                }
                
                // 2. Cacher le "Matricule"
                if (el.innerText.includes("Matricule")) {
                    el.style.display = 'none'; // Cache le texte "Matricule"
                    
                    // Cache aussi la case de saisie juste après
                    if (el.nextElementSibling) {
                        el.nextElementSibling.style.display = 'none';
                    }
                }
            });
            console.log("Terminal : Mode Procureur activé (Texte modifié + Matricule masqué)");
        }
    }

    // On lance la fonction dès que le Terminal finit de charger
    window.onload = applyProcureurMode;
</script>

<script>
    function applyRPModifiers() {
        // 1. On récupère le rôle dans l'URL (?role=procureur)
        const params = new URLSearchParams(window.location.search);
        const role = params.get('role');

        if (role === 'procureur') {
            console.log("Mode Procureur détecté. Modification du terminal...");
            
            // 2. On scanne tous les éléments de texte
            const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
            let node;
            while(node = walker.nextNode()) {
                // Remplacer Officier par Procureur
                if (node.nodeValue.includes("Officier en charge")) {
                    node.nodeValue = node.nodeValue.replace("Officier en charge", "Procureur en charge");
                }
                // Remplacer les majuscules aussi au cas où
                if (node.nodeValue.includes("OFFICIER EN CHARGE")) {
                    node.nodeValue = node.nodeValue.replace("OFFICIER EN CHARGE", "PROCUREUR EN CHARGE");
                }
            }

            // 3. On cache le Matricule et sa case
            // On cherche tous les éléments qui contiennent le mot "Matricule"
            const allElements = document.querySelectorAll('label, span, td, th, p');
            allElements.forEach(el => {
                if (el.innerText.includes("Matricule")) {
                    el.style.display = 'none'; // Cache le texte
                    
                    // Si c'est un label, on cache l'input qui suit
                    if (el.nextElementSibling) {
                        el.nextElementSibling.style.display = 'none';
                    }
                    // Si c'est dans un tableau, on cache la case d'à côté
                    if (el.tagName === 'TD' && el.parentElement) {
                        el.parentElement.style.display = 'none';
                    }
                }
            });
        }
    }

    // On s'exécute au chargement
    window.onload = applyRPModifiers;
</script>

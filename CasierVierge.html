<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SADOJ - Extrait de Casier Judiciaire</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Fira+Code:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg-dark: #0f172a;
            --text-muted: #94a3b8;
            --success: #10b981;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-dark); 
            color: white; 
            margin: 0; 
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- LE DOCUMENT OFFICIEL --- */
        .document-container {
            background: #1e293b;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            width: 100%;
            max-width: 800px;
            padding: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        /* EN-TÊTE */
        .doc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .doc-logo { max-width: 120px; }
        .doc-title { text-align: right; }
        .doc-title h1 { margin: 0; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 1px; }
        .doc-title p { margin: 5px 0 0 0; color: var(--text-muted); font-size: 0.85rem; font-family: 'Fira Code', monospace; }

        /* CORPS DU DOCUMENT */
        .doc-body { margin-bottom: 40px; }
        .info-group { margin-bottom: 15px; display: flex; align-items: center; }
        .info-group label { width: 180px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; font-size: 0.85rem; }
        
        .info-input {
            flex: 1;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 12px;
            border-radius: 4px;
            color: white;
            font-family: 'Fira Code', monospace;
            font-size: 1rem;
            outline: none;
        }
        .info-input:focus { border-color: var(--primary); }

        /* RÉSULTAT (VIERGE) */
        .result-box {
            background: rgba(16, 185, 129, 0.05);
            border: 2px dashed var(--success);
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            margin: 40px 0;
        }
        .result-box h2 {
            margin: 0;
            color: var(--success);
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 800;
        }
        .result-box p { margin: 10px 0 0 0; color: #a7f3d0; font-size: 0.9rem; }

        /* SIGNATURE */
        .signature-area {
            display: flex;
            justify-content: space-between;
            margin-top: 50px;
        }
        .sign-block { width: 45%; }
        .sign-line {
            border-bottom: 1px solid var(--text-muted);
            height: 40px;
            margin-bottom: 5px;
        }
        .sign-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; }
        
        /* SIGNATURE PROCUREUR (PRÉ-REMPLIE) */
        .sign-proc {
            font-family: 'Times New Roman', serif;
            font-style: italic;
            font-size: 1.5rem;
            color: #60a5fa;
            text-align: center;
            line-height: 40px;
        }

        /* BOUTON D'ACTION */
        .controls { margin-top: 30px; text-align: center; }
        .btn-print {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-print:hover { background: #1d4ed8; }

        /* --- STYLE POUR L'IMPRESSION (PDF) --- */
        @media print {
            body { background: white; color: black; padding: 0; }
            .document-container { 
                background: white; 
                border: none; 
                box-shadow: none; 
                max-width: 100%; 
                padding: 20px; 
            }
            .controls { display: none; } /* Cache le bouton */
            .info-input { 
                background: transparent; 
                border: none; 
                border-bottom: 1px dotted black; 
                color: black; 
                padding: 0; 
                border-radius: 0;
            }
            .info-group label { color: black; }
            .doc-title p, .sign-label { color: #555; }
            .sign-proc { color: #000; }
            .result-box { border: 2px solid black; background: transparent; }
            .result-box h2 { color: black; }
            .result-box p { color: #333; }
        }
    </style>
</head>
<body>

    <div class="document-container">
        
        <div class="doc-header">
            <img src="https://i.imgur.com/Pf4XkWF.png" alt="SADOJ Logo" class="doc-logo">
            <div class="doc-title">
                <h1>Extrait de Casier Judiciaire</h1>
                <p>State of San Andreas - Department of Justice</p>
                <p>Réf: SADOJ-B3-<span id="ref-num"></span></p>
            </div>
        </div>

        <div class="doc-body">
            <div class="info-group">
                <label>Nom :</label>
                <input type="text" class="info-input" placeholder="Saisir le nom..." spellcheck="false">
            </div>
            <div class="info-group">
                <label>Prénom(s) :</label>
                <input type="text" class="info-input" placeholder="Saisir le prénom..." spellcheck="false">
            </div>
            <div class="info-group">
                <label>Date de Naissance :</label>
                <input type="date" class="info-input">
            </div>
        </div>

        <div class="result-box">
            <h2>NÉANT</h2>
            <p>Aucune condamnation pénale ou financière n'est inscrite au dossier de l'individu à ce jour.</p>
        </div>

        <div class="signature-area">
            <div class="sign-block">
                <div class="sign-line" style="text-align: center; line-height: 40px; font-family: 'Fira Code', monospace; font-size: 1rem; color: #cbd5e1;">
                    <span id="current-date"></span>
                </div>
                <div class="sign-label">Date de délivrance</div>
            </div>
            <div class="sign-block">
                <div class="sign-line sign-proc">Approuvé par le D.O.J</div>
                <div class="sign-label" style="text-align: right;">Sceau / Signature Officielle</div>
            </div>
        </div>

    </div>

    <div class="controls">
        <button class="btn-print" onclick="window.print()">🖨️ Sauvegarder en PDF</button>
    </div>

    <script>
        // Générer une référence unique aléatoire
        document.getElementById('ref-num').innerText = Math.floor(100000 + Math.random() * 900000);

        // Mettre la date du jour automatiquement
        const today = new Date();
        const dd = String(today.getDate()).padStart(2, '0');
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const yyyy = today.getFullYear();
        document.getElementById('current-date').innerText = dd + '/' + mm + '/' + yyyy;
    </script>
</body>
</html>

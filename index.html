<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.A.D.O.J. Portal</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        :root {
            --primary: #2563eb; 
            --primary-hover: #1d4ed8;
            --bg-dark: #020617; 
            --panel: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-muted: #94a3b8; 
            --danger: #ef4444; 
        }

        * { -webkit-user-select: none; user-select: none; box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-dark); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* CHARGEMENT */
        #loading-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(37, 99, 235, 0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* AUTHENTIFICATION */
        .auth-view { height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, #1e293b 0%, #020617 100%); }
        .auth-box { background: var(--panel); backdrop-filter: blur(20px); padding: 40px; border-radius: 24px; border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .auth-box img { width: 100px; margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(37, 99, 235, 0.4)); }
        .auth-box h2 { font-weight: 800; letter-spacing: -1px; margin: 0; }
        .auth-box p { color: var(--text-muted); font-size: 0.85rem; margin-top: 5px; margin-bottom: 30px; }
        .auth-box input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 14px; border-radius: 12px; color: white; margin-bottom: 15px; outline: none; transition: 0.2s; }
        .auth-box input:focus { border-color: var(--primary); background: rgba(0,0,0,0.5); }
        
        .btn-login { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-login:hover { background: var(--primary-hover); transform: translateY(-2px); }
        
        .btn-citizen { width: 100%; background: transparent; color: var(--text-muted); border: 1px solid var(--border); padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 15px; transition: 0.2s; }
        .btn-citizen:hover { background: rgba(255, 255, 255, 0.05); color: white; border-color: white; }

        /* INTERFACE PRINCIPALE */
        #view-main { display: none; height: 100vh; }
        
        .sidebar { width: 280px; background: #020617; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; }
        .user-card { background: rgba(37, 99, 235, 0.05); padding: 15px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 25px; }
        .user-name { display: block; font-weight: 800; font-size: 0.9rem; color: white; }
        .user-role { display: block; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; margin-top: 4px; letter-spacing: 1px; }

        .nav-group { margin-bottom: 25px; }
        .nav-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; font-weight: 900; letter-spacing: 1.5px; margin-bottom: 10px; margin-left: 10px; }
        .nav-item { width: 100%; background: transparent; border: none; color: var(--text-muted); padding: 12px 15px; border-radius: 12px; text-align: left; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 12px; transition: 0.2s; margin-bottom: 4px; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }

        .content-container { flex-grow: 1; background: #0f172a; position: relative; }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        iframe.visible { display: block; }

        .btn-logout { margin-top: auto; color: var(--danger); font-size: 0.8rem; font-weight: 800; text-align: center; padding: 15px; cursor: pointer; border-top: 1px solid var(--border); opacity: 0.6; transition: 0.3s; }
        .btn-logout:hover { opacity: 1; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-size: 0.7rem; letter-spacing: 3px; font-weight: 800;">SECURE LINK...</p>
    </div>

    <div id="view-login" class="auth-view">
        <div class="auth-box">
            <img src="https://i.imgur.com/Pf4XkWF.png" alt="SADOJ Logo">
            <h2>S.A.D.O.J. PORTAL</h2>
            <p>Portail d'accès au réseau du Département de la Justice</p>
            <input type="email" id="field-email" placeholder="Email de l'agent">
            <input type="password" id="field-pass" placeholder="Clé d'accès">
            <button class="btn-login" onclick="handleAuth()">INITIALISER LA SESSION</button>
            <button class="btn-citizen" onclick="enterAsCitizen()">ACCÈS CITOYEN (PUBLIC)</button>
        </div>
    </div>

    <div id="view-main">
        <div class="sidebar">
            <div class="user-card">
                <span id="display-name" class="user-name">Agent</span>
                <span id="display-role" class="user-role">Vérification...</span>
            </div>

            <nav class="nav-group">
    <div class="nav-label">S.A State Code (Public)</div>
    <button class="nav-item" onclick="switchTab('tab-cj', this)">⚖️ Code Juridictionnel</button>
    <button class="nav-item" onclick="switchTab('tab-const', this)">📜 Constitution</button>
    <button class="nav-item" onclick="switchTab('tab-penal', this)">⚖️ Code Pénal</button>
    <button class="nav-item" onclick="switchTab('tab-proc-penal', this)">⛓️ Procédure Pénale</button>
    <button class="nav-item" onclick="switchTab('tab-civil', this)">🤝 Code Civil</button>
    <button class="nav-item" onclick="switchTab('tab-admin', this)">🏢 Code Administratif</button>
    <button class="nav-item" onclick="switchTab('tab-proc-admin', this)">📋 CPAD</button>
    <button class="nav-item" onclick="switchTab('tab-travail', this)">💼 Code du Travail</button>
    <button class="nav-item" onclick="switchTab('tab-secu', this)">🛡️ Sécurité Intérieure</button>
    <button class="nav-item" onclick="switchTab('tab-ruralite', this)">🌲 Code de Ruralité</button>
    <button class="nav-item" onclick="switchTab('tab-sanctions', this)">💰 Sanctions & Amendes</button>
    <button class="nav-item" onclick="switchTab('tab-niveau', this)">⚠️ Niveaux de Sécurité</button>
    
    <div id="group-police" style="display:none;">
        <div class="nav-label">Opérations</div>
        <button class="nav-item" onclick="switchTab('tab-mdt', this)">🚓 Terminal MDT</button>
    </div>

    <div id="group-procureur" style="display:none;">
        <div class="nav-label">Justice</div>
        <button class="nav-item" onclick="switchTab('tab-justice', this)">📂 Dossiers d'Instruction</button>
    </div>
</nav>

            <div id="logout-zone" class="btn-logout" onclick="logoutSession()">DÉCONNEXION DU SYSTÈME</div>
        </div>

        <div class="content-container">
    <iframe id="tab-cj" src="./StateCode/CJ.html"></iframe>
    <iframe id="tab-const" src="./StateCode/DeclarationConstitutionnelle.html"></iframe>
    <iframe id="tab-penal" src="./StateCode/CP.html"></iframe>
    <iframe id="tab-proc-penal" src="./StateCode/CPP.html"></iframe>
    <iframe id="tab-civil" src="./StateCode/CC.html"></iframe>
    <iframe id="tab-admin" src="./StateCode/CA.html"></iframe>
    <iframe id="tab-proc-admin" src="./StateCode/CPAD.html"></iframe>
    <iframe id="tab-travail" src="./StateCode/CDT.html"></iframe>
    <iframe id="tab-secu" src="./StateCode/CSI.html"></iframe>
    <iframe id="tab-ruralite" src="./StateCode/CDR.html"></iframe>
    <iframe id="tab-sanctions" src="./StateCode/Sanctions.html"></iframe>
    <iframe id="tab-niveau" src="./StateCode/NS.html"></iframe>
    
    <iframe id="tab-mdt" src="./Terminal.html"></iframe>
</div>

    <script>
        // --- LOGIQUE NETLIFY IDENTITY ---

        netlifyIdentity.on('init', user => {
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 500);
            if (user) loginSuccess(user);
        });

        function handleAuth() {
            const email = document.getElementById('field-email').value;
            const pass = document.getElementById('field-pass').value;
            if (!email || !pass) return alert("Veuillez remplir les protocoles de sécurité.");

            netlifyIdentity.gotrue.login(email, pass)
                .then(user => console.log("Login OK"))
                .catch(err => alert("Accès refusé par le serveur central S.A.D.O.J."));
        }

        netlifyIdentity.on('login', user => loginSuccess(user));
        netlifyIdentity.on('logout', () => window.location.reload());

        function logoutSession() {
            if(netlifyIdentity.currentUser()) {
                netlifyIdentity.logout();
            } else {
                window.location.reload();
            }
        }

        // --- GESTION DES ACCÈS ---

        function loginSuccess(user) {
            document.getElementById('view-login').style.display = 'none';
            document.getElementById('view-main').style.display = 'flex';

            document.getElementById('display-name').textContent = user.user_metadata.full_name || user.email.split('@')[0].toUpperCase();
            
            const roles = user.app_metadata.roles || [];
            const roleDisplay = document.getElementById('display-role');

            if (roles.includes('procureur')) {
                roleDisplay.textContent = "Procureur de l'État";
                roleDisplay.style.color = "#ef4444";
                document.getElementById('group-procureur').style.display = 'block';
                document.getElementById('group-police').style.display = 'block';
            } else if (roles.includes('officier')) {
                roleDisplay.textContent = "Officier Assermenté";
                roleDisplay.style.color = "#2563eb";
                document.getElementById('group-police').style.display = 'block';
            } else {
                roleDisplay.textContent = "Agent de l'État";
                roleDisplay.style.color = "#94a3b8";
            }
            
            switchTab('tab-codes', document.querySelector('.nav-item'));
        }

        // --- ACCÈS PUBLIC (CITOYEN) ---

        function enterAsCitizen() {
            document.getElementById('view-login').style.display = 'none';
            document.getElementById('view-main').style.display = 'flex';

            document.getElementById('display-name').textContent = "Citoyen de San Andreas";
            const roleDisplay = document.getElementById('display-role');
            roleDisplay.textContent = "Accès Public (Lecture seule)";
            roleDisplay.style.color = "#94a3b8";

            // On s'assure que tout le reste est bien caché
            document.getElementById('group-police').style.display = 'none';
            document.getElementById('group-procureur').style.display = 'none';
            document.getElementById('logout-zone').textContent = "RETOURS À L'ACCUEIL";

            switchTab('tab-codes', document.querySelector('.nav-item'));
        }

        // --- NAVIGATION ---

        function switchTab(id, btn) {
            document.querySelectorAll('iframe').forEach(i => i.classList.remove('visible'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('visible');
            btn.classList.add('active');
        }

        // --- SÉCURITÉ ---
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) e.preventDefault();
        });
    </script>
</body>
</html>
